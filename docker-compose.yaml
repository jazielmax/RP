services:
  db:
    build:
      context: ./docker/postgres
    environment:
      - POSTGRES_DB=dejavu
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    networks:
      - db_network
  python:
    build:
      context: ./docker/python
    volumes:
      - .:/code
    working_dir: /code  # <---- Set working directory
    devices:
      - /dev/bus/usb:/dev/bus/usb  #<-- Uncomment once Udev is mplimented
    depends_on:
      - db
    networks:
      - db_network
    #privileged: true
networks:
  db_network:
