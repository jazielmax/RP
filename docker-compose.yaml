services:
  db:
    build:
      context: ./docker/postgres
    environment:
      - POSTGRES_DB=dejavu
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network

  python:
    build:
      context: ./docker/python
    volumes:
      - .:/code
      - /dev/bus/usb:/dev/bus/usb
    working_dir: /code
    ports:
      - "8000:8000"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    depends_on:
      - db
    networks:
      - db_network
    ulimits:
      memlock: -1
      rtprio: 99
    command: uvicorn SDR:app --host 0.0.0.0 --port 8000

networks:
  db_network:

volumes:
  postgres_data: